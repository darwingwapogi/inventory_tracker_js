<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Tracker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px 20px;
            text-align: center;
        }

        header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .timezone {
            font-size: 14px;
            opacity: 0.9;
            font-weight: 500;
        }

        main {
            padding: 30px 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            border-left: 4px solid #667eea;
            transition: transform 0.2s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 13px;
            color: #666;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #667eea;
        }

        .form-group {
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 10px;
            margin-bottom: 30px;
        }

        input {
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s ease;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 14px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .btn-success {
            background: #28a745;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-success:hover {
            background: #218838;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn-danger:hover {
            background: #c82333;
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
        }

        th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
            color: #333;
            border-bottom: 2px solid #e0e0e0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        tbody tr:hover {
            background: #f8f9fa;
        }

        .actions {
            display: flex;
            gap: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        @media (max-width: 768px) {
            .form-group {
                grid-template-columns: 1fr;
            }

            header h1 {
                font-size: 24px;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            table {
                font-size: 13px;
            }

            th, td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Inventory Tracker</h1>
            <div class="timezone">Pacific Time: <span id="pacificTime"></span></div>
        </header>

        <main>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-label">Total Items</div>
                    <div class="stat-value" id="totalQty">0</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Total Value</div>
                    <div class="stat-value">$<span id="totalValue">0.00</span></div>
                </div>
            </div>

            <form class="form-group" onsubmit="handleAddItem(event)">
                <input 
                    type="text" 
                    id="itemName" 
                    placeholder="Item Name (e.g., Coffee Beans)" 
                    required>
                <input 
                    type="number" 
                    id="qty" 
                    placeholder="Quantity" 
                    min="1" 
                    required>
                <input 
                    type="number" 
                    id="price" 
                    placeholder="Price" 
                    min="0" 
                    step="0.01" 
                    required>
                <button type="submit" class="btn-primary">Add Item</button>
            </form>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Item</th>
                            <th>Qty</th>
                            <th>Price</th>
                            <th>Total</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itemList"></tbody>
                </table>
            </div>

            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-state-icon">📭</div>
                <p>No items yet. Add your first item above!</p>
            </div>
        </main>
    </div>

    <script>
        let items = [];

        // Update Pacific Time
        function updatePacificTime() {
            const now = new Date();
            const pacificTime = now.toLocaleString("en-US", {
                timeZone: "America/Los_Angeles",
                month: "short",
                day: "numeric",
                hour: "numeric",
                minute: "2-digit",
                second: "2-digit",
                hour12: true
            });
            document.getElementById("pacificTime").textContent = pacificTime;
        }

        setInterval(updatePacificTime, 1000);
        updatePacificTime();

        // Handle form submission
        function handleAddItem(event) {
            event.preventDefault();
            addItem();
        }

        // Add new item
        function addItem() {
            const name = document.getElementById("itemName").value.trim();
            const qty = parseInt(document.getElementById("qty").value);
            const price = parseFloat(document.getElementById("price").value);

            if (!name || isNaN(qty) || qty <= 0 || isNaN(price) || price < 0) {
                alert("Please enter valid values.");
                return;
            }

            items.push({
                id: Date.now(),
                name,
                qty,
                price
            });

            // Clear form
            document.getElementById("itemName").value = "";
            document.getElementById("qty").value = "";
            document.getElementById("price").value = "";
            document.getElementById("itemName").focus();

            render();
        }

        // Decrease item quantity
        function useItem(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;

            item.qty--;

            if (item.qty <= 0) {
                items = items.filter(i => i.id !== id);
            }

            render();
        }

        // Delete item completely
        function deleteItem(id) {
            items = items.filter(i => i.id !== id);
            render();
        }

        // Update totals
        function updateTotals() {
            let totalQty = 0;
            let totalValue = 0;

            items.forEach(item => {
                totalQty += item.qty;
                totalValue += item.qty * item.price;
            });

            document.getElementById("totalQty").textContent = totalQty;
            document.getElementById("totalValue").textContent = totalValue.toFixed(2);
        }

        // Render items list
        function render() {
            const tbody = document.getElementById("itemList");
            const emptyState = document.getElementById("emptyState");

            if (items.length === 0) {
                tbody.innerHTML = "";
                emptyState.style.display = "block";
                updateTotals();
                return;
            }

            emptyState.style.display = "none";
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td><strong>${escapeHtml(item.name)}</strong></td>
                    <td>${item.qty}</td>
                    <td>$${item.price.toFixed(2)}</td>
                    <td>$${(item.qty * item.price).toFixed(2)}</td>
                    <td>
                        <div class="actions">
                            <button class="btn-success" onclick="useItem(${item.id})">Use</button>
                            <button class="btn-danger" onclick="deleteItem(${item.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            updateTotals();
        }

        // Simple HTML escape to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initial render
        render();
    </script>
</body>
</html>
